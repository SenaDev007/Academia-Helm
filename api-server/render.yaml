services:
  - type: web
    name: academia-helm-api
    runtime: node
    rootDir: apps/api-server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://academiahelm.com
    healthCheckPath: /health
    autoDeploy: true

