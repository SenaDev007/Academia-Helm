# fly.toml app configuration file for academia-helm-api
# Generated for Fly.io deployment

app = 'academia-helm-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  # Garder la machine toujours active en développement (évite les 503)
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # 1GB RAM — NestJS avec 534 modèles Prisma + 60+ modules consomme ~600-800MB
  memory_mb = 1024

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
