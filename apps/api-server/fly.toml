# fly.toml app configuration file generated for academia-helm-api on 2026-06-17T15:00:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'academia-helm-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
  memory = '4gb'
  processes = ['app']
  size = 'shared-cpu-2x'
