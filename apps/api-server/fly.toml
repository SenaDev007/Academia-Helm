app = 'academia-helm-api'
# Frankfurt = plus proche de Neon PostgreSQL (eu-central-1)
# Johannesburg (jnb) était trop loin → latence élevée
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  # 512MB — suffisant après optimisation (PrismaService unique, pool réduit)
  memory_mb = 512

[checks]
  [checks.health]
    # Grace period augmenté : NestJS avec 534 modèles Prisma met ~10s à démarrer
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "10s"
    type = "http"
