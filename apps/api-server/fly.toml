# fly.toml app configuration file generated for academia-helm-api on 2026-06-17T05:45:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'academia-helm-api'
# Frankfurt = plus proche de Neon PostgreSQL (eu-central-1)
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # 1GB RAM — NestJS avec 534 modèles Prisma + 60+ modules consomme ~600-800MB
  # au démarrage. 512MB = OOM systématique.
  # Coût : ~$1.94/mois (plan Fly.io)
  memory_mb = 1024

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
