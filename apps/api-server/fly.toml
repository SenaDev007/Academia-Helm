# fly.toml app configuration file generated for academia-helm-api on 2026-06-17T15:00:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'academia-helm-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# Une seule configuration VM — 4 GB RAM, 2 CPUs partagés.
# L'app NestJS utilise --max-old-space-size=1536 (1.5 GB heap), le reste
# est pour l'OS, Chromium (Puppeteer), Redis, et le buffer de sécurité.
# Anciennement : 2 blocs [[vm]] conflictuels (2048 MB et 4096 MB) →
# Fly.io pouvait utiliser le plus petit et crasher en OOM.
[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
  size = 'shared-cpu-2x'
