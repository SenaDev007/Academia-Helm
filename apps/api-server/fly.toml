# fly.toml app configuration file generated for academia-helm-api on 2026-06-17T06:11:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'academia-helm-api'
# Frankfurt = plus proche de Neon PostgreSQL (eu-central-1)
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
  memory = '2gb'
  processes = ['app']
  size = 'shared-cpu-1x'

[checks]

  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
