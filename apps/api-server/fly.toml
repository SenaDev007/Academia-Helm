# fly.toml — Configuration PRODUCTION pour academia-helm-api

app = 'academia-helm-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048

# PAS de [checks] — flyctl deploy a son propre timeout de health check
# qui échoue systématiquement avec NestJS (60+ modules, 534 modèles Prisma).
# Le déploiement réussit sans checks, puis on vérifie les logs manuellement.
