# fly.toml — Configuration PRODUCTION pour academia-helm-api

app = 'academia-helm-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # 2GB RAM — NestJS avec 534 modèles Prisma + 60+ modules consomme
  # ~850MB au démarrage. 1GB = OOM systématique.
  # 2GB laisse ~1GB pour OS + Node runtime + Prisma non-heap.
  memory_mb = 2048

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '10s'
    grace_period = '120s'
    method = 'GET'
    path = '/health'
