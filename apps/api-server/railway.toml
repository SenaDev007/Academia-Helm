[deploy]
  [deploy.healthcheck]
    type = "http"
    port = 3000
    path = "/health"
    grace_period = 300

[env]
  # 384MB heap max — adapté pour une VM 512MB (Fly.io, Railway, Render free tier).
  # Répartition mémoire sur 512MB :
  #   - OS + init : ~60MB
  #   - Node runtime (non-heap) : ~60MB
  #   - Prisma Client (534 modèles) : ~150MB
  #   - Pool PostgreSQL (3 connexions) : ~21MB
  #   - V8 heap : jusqu'à 384MB (mais GC agressif avant)
  #   Total max théorique : ~675MB → GC tient le heap sous ~250MB en pratique
  NODE_OPTIONS = "--max-old-space-size=768"
