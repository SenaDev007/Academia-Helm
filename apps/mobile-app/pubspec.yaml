name: academia_helm_mobile
description: "Academia Helm — Application mobile SaaS multi-tenant pour établissements scolaires"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── UI ──────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  phosphor_flutter: ^2.1.0
  flutter_animate: ^4.5.0
  pull_down_button: ^0.10.1

  # ── State Management ────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ──────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Network ─────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  connectivity_plus: ^6.0.3

  # ── Models ──────────────────────────────────────────────────────────
  freezed_annotation: ^2.4.3
  json_annotation: ^4.9.0

  # ── Storage ─────────────────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # ── Authentication & Security ───────────────────────────────────────
  crypto: ^3.0.3

  # ── Notifications ───────────────────────────────────────────────────
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.2.2

  # ── Utils ───────────────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  logger: ^2.3.0
  uuid: ^4.4.0
  collection: ^1.18.0
  rxdart: ^0.28.0
  async: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code Generation ─────────────────────────────────────────────────
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.2
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

  # ── Testing ─────────────────────────────────────────────────────────
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/l10n/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
