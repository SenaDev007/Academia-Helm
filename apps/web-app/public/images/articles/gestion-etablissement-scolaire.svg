<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B2B6B"/>
      <stop offset="0.55" stop-color="#2D5BFF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glass" x1="240" y1="190" x2="1380" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.22"/>
      <stop offset="1" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blur" x="-50" y="-50" width="1700" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <g filter="url(#blur)" opacity="0.9">
    <circle cx="340" cy="230" r="190" fill="#22C55E" fill-opacity="0.35"/>
    <circle cx="1360" cy="210" r="220" fill="#F59E0B" fill-opacity="0.35"/>
    <circle cx="1220" cy="740" r="260" fill="#38BDF8" fill-opacity="0.28"/>
  </g>

  <!-- Glass panel -->
  <rect x="180" y="150" width="1240" height="600" rx="40" fill="url(#glass)" stroke="white" stroke-opacity="0.16"/>

  <!-- Dashboard cards -->
  <g opacity="0.92">
    <rect x="260" y="230" width="520" height="170" rx="26" fill="white" fill-opacity="0.10" stroke="white" stroke-opacity="0.18"/>
    <rect x="820" y="230" width="520" height="170" rx="26" fill="white" fill-opacity="0.10" stroke="white" stroke-opacity="0.18"/>
    <rect x="260" y="430" width="1080" height="260" rx="26" fill="white" fill-opacity="0.10" stroke="white" stroke-opacity="0.18"/>
  </g>

  <!-- Simple icons: clipboard + building -->
  <g transform="translate(300 270)" opacity="0.95">
    <rect x="0" y="18" width="86" height="108" rx="16" fill="white" fill-opacity="0.22"/>
    <rect x="18" y="0" width="50" height="32" rx="12" fill="white" fill-opacity="0.35"/>
    <rect x="18" y="52" width="50" height="10" rx="5" fill="white" fill-opacity="0.55"/>
    <rect x="18" y="74" width="42" height="10" rx="5" fill="white" fill-opacity="0.40"/>
    <rect x="18" y="96" width="34" height="10" rx="5" fill="white" fill-opacity="0.30"/>
  </g>

  <g transform="translate(860 262)" opacity="0.95">
    <rect x="0" y="22" width="110" height="104" rx="18" fill="white" fill-opacity="0.22"/>
    <rect x="18" y="40" width="18" height="18" rx="4" fill="white" fill-opacity="0.55"/>
    <rect x="44" y="40" width="18" height="18" rx="4" fill="white" fill-opacity="0.55"/>
    <rect x="70" y="40" width="18" height="18" rx="4" fill="white" fill-opacity="0.55"/>
    <rect x="18" y="66" width="18" height="18" rx="4" fill="white" fill-opacity="0.45"/>
    <rect x="44" y="66" width="18" height="18" rx="4" fill="white" fill-opacity="0.45"/>
    <rect x="70" y="66" width="18" height="18" rx="4" fill="white" fill-opacity="0.45"/>
    <rect x="48" y="88" width="14" height="38" rx="6" fill="white" fill-opacity="0.60"/>
  </g>

  <!-- Chart lines -->
  <g transform="translate(300 470)" opacity="0.95">
    <path d="M0 160C90 120 150 130 240 94C330 58 410 88 520 50C640 6 760 46 920 10" stroke="white" stroke-opacity="0.70" stroke-width="8" fill="none"/>
    <path d="M0 190C120 170 220 150 320 138C420 126 520 118 640 100C760 82 820 96 920 70" stroke="#22C55E" stroke-opacity="0.70" stroke-width="8" fill="none"/>
    <circle cx="240" cy="94" r="9" fill="white" fill-opacity="0.85"/>
    <circle cx="520" cy="50" r="9" fill="white" fill-opacity="0.85"/>
    <circle cx="920" cy="10" r="9" fill="white" fill-opacity="0.85"/>
  </g>
</svg>

