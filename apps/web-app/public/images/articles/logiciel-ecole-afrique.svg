<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061831"/>
      <stop offset="0.52" stop-color="#0B2B6B"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="glass" x1="210" y1="160" x2="1410" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.20"/>
      <stop offset="1" stop-color="white" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="blur" x="-50" y="-50" width="1700" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#blur)" opacity="0.9">
    <circle cx="360" cy="260" r="220" fill="#22C55E" fill-opacity="0.22"/>
    <circle cx="1250" cy="230" r="260" fill="#38BDF8" fill-opacity="0.22"/>
