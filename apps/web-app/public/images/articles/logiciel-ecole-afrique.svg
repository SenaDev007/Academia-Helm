  <g transform="translate(280 220)" opacity="0.92">
    <path d="M510 40c64 16 120 74 120 140 0 56-26 86-40 124-16 44-6 88-40 128-34 40-92 46-140 74-46 28-66 88-124 94-58 6-88-52-136-74-52-24-124-6-156-58-34-56 30-104 42-156 10-44-30-86-6-130 28-52 98-44 138-72 44-30 60-92 118-106 56-14 86 28 124 36 40 10 62-18 100 0Z"
