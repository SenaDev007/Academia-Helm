<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061831"/>
      <stop offset="0.55" stop-color="#2D5BFF"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="glass" x1="210" y1="170" x2="1410" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.20"/>
      <stop offset="1" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blur" x="-50" y="-50" width="1700" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#blur)" opacity="0.9">
    <circle cx="360" cy="240" r="230" fill="#F59E0B" fill-opacity="0.18"/>
    <circle cx="1240" cy="260" r="250" fill="#22C55E" fill-opacity="0.18"/>
    <circle cx="1180" cy="740" r="320" fill="#7C3AED" fill-opacity="0.16"/>
  </g>

  <rect x="170" y="150" width="1260" height="610" rx="44" fill="url(#glass)" stroke="white" stroke-opacity="0.16"/>

  <!-- Unified suite: 4 tiles -->
  <g opacity="0.92">
    <rect x="260" y="240" width="520" height="230" rx="30" fill="white" fill-opacity="0.10" stroke="white" stroke-opacity="0.18"/>
    <rect x="820" y="240" width="520" height="230" rx="30" fill="white" fill-opacity="0.10" stroke="white" stroke-opacity="0.18"/>
    <rect x="260" y="500" width="520" height="200" rx="30" fill="white" fill-opacity="0.10" stroke="white" stroke-opacity="0.18"/>
    <rect x="820" y="500" width="520" height="200" rx="30" fill="white" fill-opacity="0.10" stroke="white" stroke-opacity="0.18"/>
  </g>

  <!-- Icons: student, wallet, grade, people -->
  <g transform="translate(320 300)" opacity="0.95">
    <circle cx="56" cy="52" r="34" fill="white" fill-opacity="0.22"/>
    <path d="M20 118c8-26 28-40 60-40s52 14 60 40" stroke="white" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>
    <rect x="30" y="96" width="52" height="10" rx="5" fill="white" fill-opacity="0.35"/>
  </g>

  <g transform="translate(880 300)" opacity="0.95">
    <rect x="10" y="26" width="128" height="92" rx="22" fill="white" fill-opacity="0.22"/>
    <circle cx="46" cy="72" r="18" fill="#22C55E" fill-opacity="0.55"/>
    <rect x="74" y="58" width="46" height="12" rx="6" fill="white" fill-opacity="0.45"/>
    <rect x="74" y="80" width="34" height="12" rx="6" fill="white" fill-opacity="0.30"/>
  </g>

  <g transform="translate(320 560)" opacity="0.95">
    <rect x="10" y="12" width="128" height="120" rx="22" fill="white" fill-opacity="0.22"/>
    <path d="M36 60l18 18 48-56" stroke="white" stroke-opacity="0.70" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="34" y="96" width="76" height="12" rx="6" fill="white" fill-opacity="0.35"/>
  </g>

  <g transform="translate(880 560)" opacity="0.95">
    <circle cx="54" cy="56" r="26" fill="white" fill-opacity="0.22"/>
    <circle cx="118" cy="56" r="26" fill="white" fill-opacity="0.16"/>
    <path d="M14 132c6-24 22-36 44-36s38 12 44 36" stroke="white" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>
    <path d="M78 132c6-18 20-28 40-28s34 10 40 28" stroke="white" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Accent tagline bar -->
  <g transform="translate(260 720)" opacity="0.85">
    <rect x="0" y="0" width="1080" height="12" rx="6" fill="white" fill-opacity="0.20"/>
    <rect x="0" y="0" width="720" height="12" rx="6" fill="#22C55E" fill-opacity="0.45"/>
    <circle cx="720" cy="6" r="12" fill="white" fill-opacity="0.72"/>
  </g>
</svg>

